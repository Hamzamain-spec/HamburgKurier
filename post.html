<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artikel — HamburgKurier</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Libre+Baskerville:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0A2342;--steel:#1C4E80;--ice:#E8F0FA;--white:#fff;--bg:#F3F6FC;--dark:#0D1B2A;--mid:#5B7A99;--border:#C8D8EC;--gold:#E8A020;--anchor:#162D4A}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--dark)}
.rope{height:6px;background:repeating-linear-gradient(90deg,var(--navy) 0,var(--navy) 12px,var(--steel) 12px,var(--steel) 24px,var(--gold) 24px,var(--gold) 36px,var(--steel) 36px,var(--steel) 48px)}
header{background:var(--navy)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{text-decoration:none;display:flex;align-items:center;gap:12px}
.logo-anchor{font-size:26px}
.logo-name{font-family:'Libre Baskerville',serif;font-size:22px;font-weight:700;color:#fff}
.logo-name span{color:var(--gold)}
nav{background:var(--anchor);border-bottom:2px solid var(--gold)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;display:flex}
nav a{display:block;padding:11px 16px;color:rgba(255,255,255,0.65);text-decoration:none;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:color 0.2s}
nav a:hover{color:var(--gold)}
.post-hero{background:var(--navy);padding:72px 32px;position:relative;overflow:hidden}
.post-hero::before{content:'⚓';position:absolute;font-size:240px;right:32px;bottom:-40px;opacity:0.04;line-height:1}
.post-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(to right,var(--gold),var(--steel),var(--gold))}
.post-hero-inner{max-width:860px;margin:0 auto;position:relative}
.post-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.post-cat-badge{background:var(--gold);color:var(--dark);font-size:9px;font-weight:700;letter-spacing:3px;padding:4px 12px;text-transform:uppercase}
.post-eyebrow-line{width:40px;height:2px;background:rgba(255,255,255,0.2)}
.post-title{font-family:'Libre Baskerville',serif;font-size:54px;font-weight:700;color:#fff;line-height:1.05;margin-bottom:24px}
.post-meta{display:flex;gap:24px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,0.45);font-weight:500;padding-top:20px;border-top:1px solid rgba(255,255,255,0.1)}
.post-meta span{color:rgba(255,255,255,0.8);font-weight:600}
.layout{max-width:1080px;margin:44px auto;padding:0 32px;display:grid;grid-template-columns:1fr 255px;gap:28px}
.main-col{background:var(--white);padding:42px;border:1px solid var(--border);border-top:4px solid var(--navy)}
.back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--steel);text-decoration:none;font-size:11px;font-weight:700;margin-bottom:28px;letter-spacing:1.5px;text-transform:uppercase;padding-bottom:16px;border-bottom:1px solid var(--border);width:100%}
.back-btn:hover{color:var(--gold)}
.article-body{font-size:17px;line-height:1.9;color:#2A3A4E;font-weight:300}
.article-body p{margin-bottom:26px}
.article-body h2{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:700;color:var(--dark);margin:50px 0 16px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.article-body h3{font-size:18px;font-weight:600;color:var(--dark);margin:32px 0 10px}
.article-body a{color:var(--steel);font-weight:600;text-decoration:none;border-bottom:1px solid rgba(28,78,128,0.3)}
.article-body a:hover{color:var(--gold);border-color:var(--gold)}
.article-body ul,.article-body ol{padding-left:24px;margin-bottom:22px}
.article-body li{margin-bottom:8px;line-height:1.7}
blockquote{background:var(--ice);border-left:4px solid var(--gold);padding:22px 28px;margin:32px 0;font-style:italic;font-size:18px;color:var(--mid)}
.sidebar{display:flex;flex-direction:column;gap:16px}
.widget{background:var(--white);border:1px solid var(--border);padding:22px;border-top:3px solid var(--navy)}
.widget-title{font-family:'Libre Baskerville',serif;font-size:16px;font-weight:700;color:var(--dark);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.recent-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.recent-item:last-child{border-bottom:none}
.recent-item a{color:var(--dark);text-decoration:none;font-weight:600;display:block;margin-bottom:3px;line-height:1.4}
.recent-item a:hover{color:var(--steel)}
.recent-item span{font-size:11px;color:#bbb}
.not-found{text-align:center;padding:80px;color:var(--mid);grid-column:1/-1}
.not-found h2{font-family:'Libre Baskerville',serif;font-size:30px;color:var(--dark);margin-bottom:10px}
footer{background:var(--navy);color:rgba(255,255,255,0.4);text-align:center;padding:28px;font-size:12px;margin-top:60px}
.footer-rope{height:4px;background:repeating-linear-gradient(90deg,var(--navy) 0,var(--navy) 12px,var(--steel) 12px,var(--steel) 24px,var(--gold) 24px,var(--gold) 36px,var(--steel) 36px,var(--steel) 48px)}
footer a{color:rgba(255,255,255,0.4);text-decoration:none;margin:0 8px}
footer a:hover{color:var(--gold)}
.fl{font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:8px}
.fl span{color:var(--gold)}
</style>
</head>
<body>
<div class="rope"></div>
<header><div class="header-inner"><a href="index.html" class="logo"><div class="logo-anchor">⚓</div><div class="logo-name">Hamburg<span>Kurier</span></div></a></div></header>
<nav><div class="nav-inner"><a href="index.html">← Zurück</a><a href="index.html">Home</a><a href="index.html">Hamburg</a><a href="index.html">Hafen</a></div></nav>
<div id="post-hero" class="post-hero" style="display:none">
  <div class="post-hero-inner">
    <div class="post-eyebrow"><span class="post-cat-badge" id="post-cat">Hamburg</span><div class="post-eyebrow-line"></div></div>
    <div class="post-title" id="post-title"></div>
    <div class="post-meta"><span>✍ <span id="post-author">Redaktion</span></span><span>📅 <span id="post-date"></span></span><span>⏱ <span id="post-read">5 Min.</span></span></div>
  </div>
</div>
<div class="layout">
  <div class="main-col">
    <a href="index.html" class="back-btn">← Alle Artikel</a>
    <div id="article-body" class="article-body"></div>
    <div id="not-found" class="not-found" style="display:none"><h2>Nicht gefunden</h2></div>
  </div>
  <aside class="sidebar">
    <div class="widget"><div class="widget-title">⚓ Weitere Artikel</div><div id="recent-posts"></div></div>
    <div class="widget"><div class="widget-title">Über uns</div><p style="font-size:13px;line-height:1.7;color:#888;font-weight:300">HamburgKurier — Nachrichten aus dem Tor zur Welt. Täglich aktuell.</p></div>
  </aside>
</div>
<div class="footer-rope"></div>
<footer><div class="fl">Hamburg<span>Kurier</span></div><p>&copy; 2026 HamburgKurier &nbsp;|&nbsp;<a href="#">Impressum</a>&nbsp;|&nbsp;<a href="#">Datenschutz</a></p></footer>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const SITE_NAME = 'hamburgkurier';
const GIST_ID = '42ea11087f40fdba423f8eb0f575ac96'; // Same Gist for all sites!

async function loadPost() {
  try {
    console.log('Fetching post from Gist ID:', GIST_ID);
    console.log('Looking for post ID:', id);
    
    // Use raw URL
    const rawUrl = `https://gist.githubusercontent.com/Hamzamain-spec/${GIST_ID}/raw/posts.json`;
    const response = await fetch(rawUrl);
    
    if (response.ok) {
      const allPosts = await response.json();
      console.log('All posts:', allPosts);
      
      // Filter by site name
      const sitePosts = allPosts.filter(post => post.site === SITE_NAME);
      console.log(`Found ${sitePosts.length} posts for site: ${SITE_NAME}`);
      
      const post = sitePosts.find(p => p.id == id);
      console.log('Found post:', post);
      
      if (post) {
        document.title = post.title + ' — HamburgKurier';
        document.getElementById('post-title').textContent = post.title;
        document.getElementById('post-cat').textContent = post.category || 'Hamburg';
        document.getElementById('post-author').textContent = post.author || 'Redaktion';
        document.getElementById('post-date').textContent = new Date(post.date).toLocaleDateString('de-DE', {
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        });
        
        const words = post.content.replace(/<[^>]+>/g, '').split(' ').length;
        document.getElementById('post-read').textContent = Math.max(1, Math.round(words / 200)) + ' Min. Lesezeit';
        
        document.getElementById('article-body').innerHTML = post.content;
        document.getElementById('post-hero').style.display = 'block';
        
        // Recent posts
        const rp = document.getElementById('recent-posts');
        rp.innerHTML = '';
        sitePosts.slice(-4).reverse().forEach(p => {
          if (p.id == id) return;
          rp.innerHTML += `<div class="recent-item"><a href="post.html?id=${p.id}">${p.title}</a><span>${new Date(p.date).toLocaleDateString('de-DE')}</span></div>`;
        });
      } else {
        console.log('Post not found for ID:', id);
        document.getElementById('not-found').style.display = 'block';
      }
    } else {
      console.error('Failed to fetch from Gist:', response.status);
      document.getElementById('not-found').style.display = 'block';
    }
  } catch (error) {
    console.error('Error loading post:', error);
    document.getElementById('not-found').style.display = 'block';
  }
}

loadPost();
</script>
</body>
</html>
